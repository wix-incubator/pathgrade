name: Publish

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    environment: npm-publish

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install dependencies
        run: printf 'y\n' | NPQ_PKG_MGR=yarn npx --yes npq install
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Verify npm OIDC support
        run: |
          npm_version="$(npm --version)"
          echo "npm version: $npm_version"
          NPM_VERSION="$npm_version" node -e "const actual = process.env.NPM_VERSION.split('.').map(Number); const [major = 0, minor = 0, patch = 0] = actual; const ok = major > 11 || (major === 11 && (minor > 5 || (minor === 5 && patch >= 1))); if (!ok) { throw new Error('npm 11.5.1 or newer is required for Trusted Publishing OIDC'); }"

      - name: Build
        run: yarn build

      - name: Test
        run: yarn test

      - name: Verify release tag
        run: |
          version="$(node -p "require('./package.json').version")"
          if [ "$GITHUB_REF_TYPE" != "tag" ]; then
            echo "Publish must run from a tag, got $GITHUB_REF_TYPE"
            exit 1
          fi
          if [ "$GITHUB_REF_NAME" != "v$version" ]; then
            echo "Publish must run from tag v$version, got $GITHUB_REF_NAME"
            exit 1
          fi

      - name: Verify version is unpublished
        run: |
          version="$(node -p "require('./package.json').version")"
          if npm view "@wix/pathgrade@$version" version --registry https://registry.npmjs.org >npm-view.log 2>npm-view.err; then
            echo "@wix/pathgrade@$version is already published"
            exit 1
          fi
          if ! grep -Eq "E404|404 Not Found|is not in this registry" npm-view.err; then
            cat npm-view.err
            exit 1
          fi

      - name: Validate package contents
        run: npm pack --dry-run

      - name: Publish package
        run: npm publish --registry https://registry.npmjs.org --provenance --access public
